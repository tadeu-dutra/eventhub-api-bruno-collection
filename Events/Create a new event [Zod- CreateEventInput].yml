info:
  name: "Create a new event [Zod: CreateEventInput]"
  type: http
  seq: 2

http:
  method: POST
  url: "{{BASE_URL}}/events"
  headers:
    - name: Authorization
      value: Bearer {{TOKEN}}
  body:
    type: json
    data: |-
      {
        "title": "{{$randomCatchPhrase}} Summit 2026",
        "description": "{{$randomWords}}",
        "category": "Conference",
        "venue": "{{$randomCompanyName}} Center",
        "city": "{{$randomCity}}",
        "eventDate": "{{$randomDateFuture}}",
        "price": "{{CUSTOM_PRICE}}",
        "totalSeats": "{{CUSTOM_SEATS}}",
        "imageUrl": "{{$randomImageUrl}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const randomPrice = Math.floor(Math.random() * (5000 - 100 + 1)) + 500;
        const randomSeats = Math.floor(Math.random() * (1000 - 50 + 1)) + 50;

        bru.setVar("CUSTOM_PRICE", randomPrice);
        bru.setVar("CUSTOM_SEATS", randomSeats);
    - type: after-response
      code: bru.setVar("EVENT_ID", Number(res.getBody().data.id));
    - type: tests
      code: |-
        test("Should return 201 Created", function() {
          expect(res.getStatus()).to.equal(201);
        });

        const data = res.getBody().data;

        test("Should return an object", function() {
          expect(data).to.be.an("object");
        });

        test("Should id be a number", function() {
          expect(data.id).to.be.a("number");
        });

        // API CONTRACT SECTION ======================================
        const { z } = require("zod");

        // ==================== INPUT CONTRACT =======================
        const CreateEventInputSchema = z.object({
          title: z.string().min(1, 'Title is required'),
          description: z.string().optional().default(""),
          category: z.string(),
          venue: z.string(),
          city: z.string().min(1, "City is required"),
          eventDate: z.string().datetime({ message: "Event date must be a valid ISO datetime" }),
          price: z.union([z.number(), z.string()]),
          totalSeats: z.union([z.number(), z.string()]),
          imageUrl: z.string().url("Image URL must be a valid URL").optional().nullable(),
        });

        // ==================== RESPONSE CONTRACT ====================
        test("CreateEventInput schema matches CreateEventInput contract", () => {
          const result = CreateEventInputSchema.safeParse(req.getBody());

          if (!result.success) {
            console.error('CreateEventInputSchema validation failed:', result.error.format());
            console.error('Full response for debugging:', JSON.stringify(res.getBody(), null, 2));
          }

          expect(result.success).to.be.true;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
