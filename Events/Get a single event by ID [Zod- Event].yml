info:
  name: "Get a single event by ID [Zod: Event]"
  type: http
  seq: 3

http:
  method: GET
  url: "{{BASE_URL}}/events/{{EVENT_ID}}"
  headers:
    - name: Authorization
      value: Bearer {{TOKEN}}
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Should return status code 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("Should return event id", function() {
          expect(res.getBody().data).to.have.property("id");
        });

        test("Should event total seats be greater than 0", function() {
          expect(res.getBody().data.totalSeats).to.be.above(0);
        ;
        });

        // API CONTRACT SECTION ======================================
        const { z } = require("zod");

        const EventSchema = z.object({
          id: z.number().int().positive(),
          title: z.string().min(1, 'Title is required'),
          description: z.string(),
          category: z.string(),
          venue: z.string(),
          city: z.string(),
          eventDate: z.string().datetime(),
          price: z.union([z.number(), z.string()]),
          totalSeats: z.number().int().positive(),
          availableSeats: z.number().int().nonnegative(),
          imageUrl: z.string().url().nullable().optional(),
          createdAt: z.string().datetime(),
          updatedAt: z.string().datetime()
        });
        const ResponseSchema = z.object({
          success: z.boolean(),
          data: EventSchema
        });

        test("Event schema matches Event contract", () => {
          const result = ResponseSchema.safeParse(res.getBody());

          if (!result.success) {
            console.error('Event validation failed:', result.error.format());
            console.error('Full response for debugging:', JSON.stringify(res.getBody(), null, 2));
          }

          expect(result.success).to.be.true;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
