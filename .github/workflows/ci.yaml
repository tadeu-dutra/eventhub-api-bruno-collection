name: EventHub API Tests

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  checks: write
  pages: write
  id-token: write
  
jobs:
  test:
    name: Run EventHub API Collection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Allure CLI requires Java to process JUnit XML files
      - name: Setup Java (For Allure)
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli@3.5.0

      - name: Run EventHub API Tests
        run: |
          bru run \
            --env development \
            --sandbox developer \
            --reporter-junit junit.xml \
            --reporter-json results.json

      # Installs Allure directly onto the Ubuntu runner without Docker
      - name: Install Allure CLI
        if: always()
        run: |
          npm install -g allure-commandline --save-dev

      - name: Generate Allure Report
        if: always()
        run: |
          mkdir -p allure-results
          cp junit.xml allure-results/
          allure generate allure-results --clean -o allure-report

      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4.6.0
        with:
          branch: gh-pages
          folder: allure-report

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bruno-test-results
          path: |
            junit.xml
            results.json
