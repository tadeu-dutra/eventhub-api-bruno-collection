name: EventHub API Tests

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  checks: write
  pages: write
  id-token: write
  
jobs:
  test:
    name: Run EventHub API Collection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli@3.5.0

      - name: Run EventHub API Tests
        run: |
          bru run \
            --env development \
            --sandbox developer \
            --reporter-junit junit.xml \
            --reporter-json results.json

      - name: Publish Test Report
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2.18.0
        with:
          files: junit.xml
          check_name: EventHub API Test Results

      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@v1.11
        id: allure-report
        with:
          allure_results: . # Directory containing the junit.xml
          allure_report: allure-report
          allure_history: allure-history

      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bruno-test-results
          path: |
            junit.xml
            results.json
