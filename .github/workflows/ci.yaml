name: EventHub API Tests

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  checks: write
  pages: write
  id-token: write
  
jobs:
  test:
    name: Run EventHub API Collection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli@3.5.0

      - name: Run EventHub API Tests
        run: |
          bru run \
            --env development \
            --sandbox developer \
            --reporter-junit junit.xml \
            --reporter-json results.json

      - name: Publish Test Report
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2.18.0
        with:
          files: junit.xml
          check_name: EventHub API Test Results

      # FIX 1: Create allure-results directory and move junit.xml into it
      - name: Structure Allure Results
        if: always()
        run: |
          mkdir -p allure-results
          cp junit.xml allure-results/

      # FIX 2: Check out gh-pages history branch safely to prevent ENOENT errors
      - name: Get Allure History
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@v1.11
        id: allure-report
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      # FIX 3: Replaced peaceiris docker action with official native action
      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4.6.0
        with:
          branch: gh-pages
          folder: allure-report

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bruno-test-results
          path: |
            junit.xml
            results.json
