name: EventHub API Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Run EventHub API Collection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli@3.5.0

      - name: Debug workspace
        run: |
          echo "=== Bruno Version ==="
          bru --version

          echo
          echo "=== Current Directory ==="
          pwd

          echo
          echo "=== Workspace ==="
          ls -la

          echo
          echo "=== Environments ==="
          ls -R environments

          echo
          echo "=== Collection File ==="
          cat opencollection.yml

      - name: Run EventHub API Tests
        run: |
          bru run . \
            --sandbox developer \
            --env development \
            --reporter-junit junit.xml \
            --reporter-json results.json

      - name: Publish Test Report
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: junit.xml
          check_name: EventHub API Test Results

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bruno-test-results
          path: |
            junit.xml
            results.json