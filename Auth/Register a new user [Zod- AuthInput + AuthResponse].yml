info:
  name: "Register a new user [Zod: AuthInput + AuthResponse]"
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/auth/register"
  body:
    type: json
    data: |-
      {
        "email": "{{$randomEmail}}"  ,
        "password": "secret123"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setVar("TOKEN", res.getBody().token);
        bru.setVar("EMAIL", res.getBody().user.email);
    - type: tests
      code: |-
        test("Should return 201 Created", function() {
          expect(res.getStatus()).to.equal(201);
        });

        test("Should return a token", function() {
          expect(res.getBody()).to.have.property("token");
        });

        // API CONTRACT SECTION ======================================
        const { z } = require("zod");

        // ==================== INPUT CONTRACT =======================
        const AuthInputSchema = z.object({
          email: z.string().email('Invalid email format'),
          password: z.string().min(6, 'Password must be at least 6 characters')
        });

        // ==================== RESPONSE CONTRACT ====================
        const UserSchema = z.object({
          id: z.number().int().positive(),
          email: z.string().email(),
        });

        const AuthResponseSchema = z.object({
          success: z.literal(true),
          token: z.string(),
          user: UserSchema,
        });

        test("AuthInput schema matches AuthInput contract", () => {
          const result = AuthInputSchema.safeParse(req.getBody());

          if (!result.success) {
            console.error('AuthInput validation failed:', result.error.format());
            console.error('Full response for debugging:', JSON.stringify(res.getBody(), null, 2));
          }

          expect(result.success).to.be.true;
        });

        test("AuthResponse schema matches AuthResponse contract", () => {
          const result = AuthResponseSchema.safeParse(res.getBody());

          if (!result.success) {
            console.error('AuthResponse validation failed:', result.error.format());
            console.error('Full response for debugging:', JSON.stringify(res.getBody(), null, 2));
          }

          expect(result.success).to.be.true;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
