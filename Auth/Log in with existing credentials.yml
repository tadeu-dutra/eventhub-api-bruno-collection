info:
  name: Log in with existing credentials
  type: http
  seq: 2

http:
  method: POST
  url: "{{BASE_URL}}/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "{{EMAIL}}",
        "password": "secret123"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Should return status code 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("Should return a token", function() {
          expect(res.getBody()).to.have.property("token");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
