info:
  name: "Get a single booking by ID [Zod: Booking]"
  type: http
  seq: 2

http:
  method: GET
  url: "{{BASE_URL}}/bookings/{{BOOKING_ID}}"
  headers:
    - name: Authorization
      value: Bearer {{TOKEN}}
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Should return status code 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("Should return booking id", function() {
          expect(res.getBody().data).to.have.property("id");
        });

        // API CONTRACT SECTION ======================================
        const { z } = require("zod");

        const EventSchema = z.object({
          id: z.number().int().positive(),
          title: z.string().min(1, 'Title is required'),
          description: z.string(),
          category: z.string(),
          venue: z.string(),
          city: z.string(),
          eventDate: z.string().datetime(),
        //   price: z.number().nonnegative("Total price cannot be negative"),
          price: z.union([z.number(), z.string()]), // prices are returned as string
          totalSeats: z.number().int().positive(),
          availableSeats: z.number().int().nonnegative(),
          imageUrl: z.string().url().nullable().optional(),
          createdAt: z.string().datetime(),
          updatedAt: z.string().datetime(),
          // extra fields that exist in response
          isStatic: z.boolean().optional(),
          userId: z.number().int().positive().optional(),
        });

        const BookingSchema = z.object({
          id: z.number().int().positive(),
          eventId: z.number().int().positive(),
          // extra field that exist in response
          userId: z.number().int().positive().optional(),
          customerName: z.string().min(1, 'Customer name is required'),
          customerEmail: z.string().email('Invalid email format'),
          customerPhone: z.string().min(10, 'Phone number is too short'),
          quantity: z.number().int().min(1, "Quantity must be at least 1"),
        //   totalPrice: z.number().nonnegative("Total price cannot be negative"),
          totalPrice: z.union([z.number(), z.string()]), // prices are returned as string
          status: z.enum(['confirmed', 'cancelled'], { message: 'Status must be confirmed or cancelled'}),
          bookingRef: z.string(),
          createdAt: z.string().datetime(),
          updatedAt: z.string().datetime(),
          event: EventSchema
        });

        const ResponseSchema = z.object({
          success: z.boolean(),
          data: BookingSchema
        });

        test("Booking schema matches Booking contract", () => {
          const result = ResponseSchema.safeParse(res.getBody());

          if (!result.success) {
            console.error('Booking validation failed:', result.error.format());
            console.error('Full response for debugging:', JSON.stringify(res.getBody(), null, 2));
          }

          expect(result.success).to.be.true;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
