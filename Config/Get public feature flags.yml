info:
  name: Get public feature flags
  type: http
  seq: 1

http:
  method: GET
  url: "{{BASE_URL}}/config"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Should return status code 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("Should return showExploreLinks property", function() {
          expect(res.getBody()).to.have.property("showExploreLinks");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
