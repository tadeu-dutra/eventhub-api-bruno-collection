info:
  name: API health check
  type: http
  seq: 1

http:
  method: GET
  url: "{{BASE_URL}}/health"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Should return status code 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("Should status be ok", function() {
          expect(res.getBody().status).to.equal("ok");
        });

        test("Should database status be connected", function() {
          expect(res.getBody().dbStatus).to.equal("connected");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
